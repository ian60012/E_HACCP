version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: haccp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-haccp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haccp_password}
      POSTGRES_DB: ${POSTGRES_DB:-haccp_db}
    command: -p 5555
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haccp_user} -d ${POSTGRES_DB:-haccp_db} -p 5555"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: haccp_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-haccp_user}:${POSTGRES_PASSWORD:-haccp_password}@postgres:5555/${POSTGRES_DB:-haccp_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5555
      POSTGRES_USER: ${POSTGRES_USER:-haccp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haccp_password}
      POSTGRES_DB: ${POSTGRES_DB:-haccp_db}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: haccp_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0

  adminer:
    image: adminer:latest
    container_name: haccp_adminer
    ports:
      - "9090:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
