version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: haccp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-haccp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haccp_password}
      POSTGRES_DB: ${POSTGRES_DB:-haccp_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5555:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haccp_user} -d ${POSTGRES_DB:-haccp_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: haccp_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-haccp_user}:${POSTGRES_PASSWORD:-haccp_password}@postgres:5432/${POSTGRES_DB:-haccp_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-haccp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haccp_password}
      POSTGRES_DB: ${POSTGRES_DB:-haccp_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      ENVIRONMENT: production
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: haccp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
